<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Energy Readings</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent: #00d1b2;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            overscroll-behavior-y: contain;
        }

        #dashboard {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .gauge-container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 1.5rem;
        }

        #last-sync-info {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: center; /* Back to center as requested */
            margin-top: 20px;    /* Breathing room from the gauge */
            transition: opacity 0.3s ease;
        }

        /* Offline State */
        body.is-offline #last-sync-info {
            color: #ff3860;
        }

        .unit {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-left: 4px;
        }

        /* Subtle pulse for when data is fetching */
        .fetching {
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <div class="gauge-container">
            <div id="main-reading" style="font-size: 3rem; font-weight: bold;">--</div>
            <span class="unit">Watts</span>
        </div>

        <div id="last-sync-info">Initializing...</div>
    </div>

    <script>
        const config = {
            apiKey: localStorage.getItem('emon_apikey'),
            feedId: localStorage.getItem('power_feed_id'),
            interval: 5000
        };

        const syncElement = document.getElementById('last-sync-info');
        const valueElement = document.getElementById('main-reading');
        let updateTimer;

        async function fetchData() {
            if (!config.apiKey || !config.feedId) {
                syncElement.innerText = "Check Settings: Missing API Key/Feed ID";
                return;
            }

            syncElement.classList.add('fetching');

            try {
                const response = await fetch(`https://emoncms.org/feed/value.json?id=${config.feedId}&apikey=${config.apiKey}`);
                const value = await response.json();
                
                // Update UI
                valueElement.innerText = Math.round(value);
                const now = new Date();
                syncElement.innerText = `Last sync: ${now.toLocaleTimeString()}`;
            } catch (error) {
                syncElement.innerText = "Sync Failed (Network Error)";
            } finally {
                syncElement.classList.remove('fetching');
            }
        }

        // Visibility Logic: Stop fetching if user leaves the app
        function handleVisibilityChange() {
            if (document.hidden) {
                clearInterval(updateTimer);
            } else {
                fetchData();
                updateTimer = setInterval(fetchData, config.interval);
            }
        }

        // Online/Offline Status
        window.addEventListener('online', () => {
            document.body.classList.remove('is-offline');
            fetchData();
        });
        window.addEventListener('offline', () => {
            document.body.classList.add('is-offline');
            syncElement.innerText = "Offline - Check Connection";
        });

        // Initialize
        document.addEventListener('visibilitychange', handleVisibilityChange);
        updateTimer = setInterval(fetchData, config.interval);
        fetchData();

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
