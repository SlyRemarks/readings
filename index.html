<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#007bff">
    <title>Climate Dashboard</title>
    <style>
        :root { --bg: #f4f7f9; --card: #ffffff; --text: #333; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        h1 { font-size: 1.2rem; text-align: center; margin-bottom: 20px; font-weight: 700; opacity: 0.8; }
        
        .container { display: grid; grid-template-columns: 1fr; gap: 20px; }
        
        /* Card Styling */
        .card { 
            background: var(--card); padding: 25px 20px; border-radius: 28px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center;
            transition: all 0.4s ease; border-top: 8px solid #eee;
        }

        /* Humidity Border Colors */
        .hum-low { border-top-color: #2196f3; }    /* Blue (<40%) */
        .hum-mid { border-top-color: #4caf50; }    /* Green (40-60%) */
        .hum-high { border-top-color: #f44336; }   /* Red (>60%) */

        .room-name { font-weight: 800; font-size: 1.2rem; display: block; margin-bottom: 15px; letter-spacing: -0.5px; }
        
        /* Gauge Styling */
        .gauge-container { position: relative; width: 180px; margin: 0 auto; }
        .gauge-base { fill: none; stroke: #f0f0f0; stroke-width: 10; stroke-linecap: round; }
        .gauge-progress { 
            fill: none; stroke: #007bff; stroke-width: 10; 
            stroke-linecap: round; stroke-dasharray: 251.2; 
            stroke-dashoffset: 251.2; transition: stroke-dashoffset 1s ease-out, stroke 0.5s ease;
            transform: rotate(-180deg); transform-origin: 50% 50%;
        }
        
        .temp-display { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); }
        .temp-val { font-size: 2.2rem; font-weight: 800; display: block; color: #222; }
        .temp-unit { font-size: 0.7rem; color: #aaa; font-weight: 700; }
