<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#121212">
    <title>Climate & Energy Dashboard</title>
    <style>
        :root { 
            --bg: #121212; --card-default: #1e1e1e; 
            --text-card: #e0e0e0; --subtext-card: rgba(255,255,255,0.7);
            --gauge-track: rgba(255,255,255,0.1); 
            --up-color: #ff5252; --down-color: #40c4ff;
            --hum-up: #40c4ff; --hum-down: #ffb74d;
            --on-color: #00e676; --off-color: #ff5252;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; padding-bottom: 85px; min-height: 100vh; box-sizing: border-box; overflow-y: auto; }
        
        .version-tag {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.2);
            font-weight: 700;
            letter-spacing: 1px;
            pointer-events: none;
            z-index: 100;
        }

        .container { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 10px; }
        
        .card { position: relative; background-color: var(--card-color, var(--card-default)); background-image: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.3) 100%); height: 120px; padding: 35px 20px; border-radius: 32px; box-shadow: 0 12px 30px rgba(0,0,0,0.4); text-align: center; color: var(--text-card); overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        
        .room-living-room { --card-color: #34495e; }
        .room-big-bedroom { --card-color: #6c5ce7; }
        .room-small-bedroom { --card-color: #e67e22; }
        .room-hot-water { --card-color: #c0392b; height: 180px !important; }
        .room-solar { --card-color: #f39c12; height: 140px !important; transition: box-shadow 1s ease; }
        
        .solar-active { box-shadow: 0 0 20px rgba(241, 196, 15, 0.2), 0 12px 30px rgba(0,0,0,0.4); }

        .card-illustration { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-5deg); width: 85%; height: auto; opacity: 0.03; pointer-events: none; fill: #fff; z-index: 1; }
        .card-content-wrapper { position: relative; z-index: 2; }
        .room-name { font-weight: 800; font-size: 1.1rem; text-transform: capitalize; letter-spacing: 3px; margin-bottom: 25px; color: #fff; display: block; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        
        .gauges-row { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .gauge-box { position: relative; width: 48%; max-width: 170px; }
        .gauge-box.solo { width: 65%; max-width: 210px; }
        
        svg { width: 100%; height: auto; display: block; }
        .gauge-bg { fill: none; stroke: var(--gauge-track); stroke-width: 10; stroke-linecap: round; }
        .gauge-progress { fill: none; stroke-width: 10; stroke-linecap: round; stroke-dasharray: 110; stroke-dashoffset: 110; transition: stroke-dashoffset 1s ease-out, stroke 0.5s ease; }
        
        .val-display { position: absolute; top: 52%; left: 50%; transform: translate(-50%, 0%); width: 100%; }
        .num { font-size: 1.8rem; font-weight: 800; color: #fff; letter-spacing: -1px; line-height: 1; text-shadow: 0 1px 10px rgba(0,0,0,0.5); }
        .unit { font-size: 0.6rem; color: var(--subtext-card); font-weight: 700; text-transform: capitalize; margin-top: 5px; display: block; }
        
        /* Status Indicator Styles */
        .status-indicator { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }
        .led { width: 10px; height: 10px; border-radius: 50%; background: #444; transition: all 0.3s ease; }
        .led.on { background: var(--on-color); box-shadow: 0 0 10px var(--on-color); }
        .led.off { background: var(--off-color); box-shadow: 0 0 10px var(--off-color); }
        .status-text { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        #status { position: fixed; bottom: 0; left: 0; right: 0; padding: 22px 0; text-align: center; font-size: 0.65rem; color: var(--subtext-card); font-weight: 700; text-transform: capitalize; letter-spacing: 1.5px; background: linear-gradient(to top, var(--bg) 70%, transparent); z-index: 10; }
        #status span { cursor: pointer; text-decoration: underline; }
        
        .card:active { transform: scale(0.98); transition: transform 0.1s; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
</head>
<body>

    <div class="version-tag">v1.3.0</div>
    <div class="container" id="dashboard"></div>
    <div id="status">Checking Key...</div>

    <script>
        let API_KEY = localStorage.getItem('emoncms_apikey');
        const LAT = 51.5072; 
        const LON = -0.1276; 

        let lastSuccessTime = null;

        const rooms = [
            { 
                id: "living-room",   
                name: "Living Room",   
                tempId: "537676", 
                humId: "537677", 
                svg: `<path d="M15,90 h70 v-5 h-70 v5 M20,85 v-40 h60 v40 h-10 v-30 h-40 v30 h-10" fill="white"/>
                      <rect x="35" y="81" width="30" height="4" rx="2" fill="white" opacity="0.6" />
                      <rect x="38" y="77" width="24" height="4" rx="2" fill="white" opacity="0.8" />
                      <path d="M50,61 c-6,8 3,18 0,25 c6,0 8-6 0-25" fill="#ff5252" opacity="0.9"></path>` 
            },
            { id: "big-bedroom",    name: "Big Bedroom",   tempId: "537680", humId: "537681", svg: '<path d="M15,50v40h70V50l-10-10H25L15,50z"/>' },
            { id: "small-bedroom",  name: "Small Bedroom", tempId: "537674", humId: "537675", svg: '<path d="M20,60v30h60V60H20z"/>' },
            { 
                id: "hot-water",      
                name: "Hot Water",      
                tempId: "536155", 
                humId: null, 
                statusId: "536147", // Added status feed
                svg: '<path d="M30,65V30c0-11,9-20,20-20s20,9,20,20v35H30z"/>' 
            },
            { id: "solar",          name: "Solar",          tempId: "539991", humId: "539990", svg: '<circle cx="50" cy="50" r="18"/><line x1="50" y1="10" x2="50" y2="22" stroke="white" stroke-width="4" stroke-linecap="round"/><line x1="50" y1="78" x2="50" y2="90" stroke="white" stroke-width="4" stroke-linecap="round"/><line x1="10" y1="50" x2="22" y2="50" stroke="white" stroke-width="4" stroke-linecap="round"/><line x1="78" y1="50" x2="90" y2="50" stroke="white" stroke-width="4" stroke-linecap="round"/><line x1="21.7" y1="21.7" x2="30.2" y2="30.2" stroke="white" stroke-width="4" stroke-linecap="round"/><line x1="69.8" y1="69.8" x2="78.3" y2="78.3" stroke="white" stroke-width="4" stroke-linecap="round"/><line x1="21.7" y1="78.3" x2="30.2" y2="69.8" stroke="white" stroke-width="4" stroke-linecap="round"/><line x1="69.8" y1="30.2" x2="78.3" y2="21.7" stroke="white" stroke-width="4" stroke-linecap="round"/>' }
        ];

        function setApiKey() {
            const newKey = prompt("Enter EmonCMS API Key:", API_KEY || "");
            if (newKey) {
                localStorage.setItem('emoncms_apikey', newKey);
                API_KEY = newKey;
                updateData();
            }
        }

        function getSunProgress() {
            const times = SunCalc.getTimes(new Date(), LAT, LON);
            const now = new Date();
            const start = times.sunrise;
            const end = times.sunset;

            const solarCard = document.querySelector('.room-solar');
            if (solarCard) {
                if (now >= start && now <= end) solarCard.classList.add('solar-active');
                else solarCard.classList.remove('solar-active');
            }

            if (now < start) return 0;
            if (now > end) return 100;

            const totalDaylight = end - start;
            const elapsed = now - start;
            return (elapsed / totalDaylight) * 100;
        }

        function createCards() {
            document.getElementById('dashboard').innerHTML = rooms.map(room => {
                const label1 = room.id === "solar" ? "Total kWh" : "Temp °C";
                const label2 = room.id === "solar" ? "Watts" : "Hum %";
                return `
                <div class="card room-${room.id}">
                    <svg class="card-illustration" viewBox="0 0 100 100">${room.svg}</svg>
                    <div class="card-content-wrapper">
                        <span class="room-name">${room.name}</span>
                        <div class="gauges-row">
                            <div class="gauge-box ${!room.humId ? 'solo' : ''}">
                                <svg viewBox="0 0 100 70">
                                    <path class="gauge-bg" d="M 15 50 A 35 35 0 0 1 85 50" />
                                    <path class="gauge-progress" id="t-arc-${room.tempId}" d="M 15 50 A 35 35 0 0 1 85 50" />
                                </svg>
                                <div class="val-display">
                                    <span class="num" id="t-container-${room.tempId}"><span id="t-val-${room.tempId}">--</span></span>
                                    <span class="unit">${label1}</span>
                                </div>
                            </div>
                            ${room.humId ? `
                            <div class="gauge-box">
                                <svg viewBox="0 0 100 70">
                                    <path class="gauge-bg" d="M 15 50 A 35 35 0 0 1 85 50" />
                                    <path class="gauge-progress" id="h-arc-${room.humId}" d="M 15 50 A 35 35 0 0 1 85 50" />
                                </svg>
                                <div class="val-display">
                                    <span class="num" id="h-container-${room.humId}"><span id="h-val-${room.humId}">--</span></span>
                                    <span class="unit">${label2}</span>
                                </div>
                            </div>` : ''}
                        </div>
                        ${room.statusId ? `
                        <div class="status-indicator">
                            <div id="led-${room.statusId}" class="led"></div>
                            <div id="text-${room.statusId}" class="status-text">...</div>
                        </div>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        function updateGauge(elId, val, min, max, colorFn) {
            const el = document.getElementById(elId);
            if(!el) return;
            const clamped = Math.min(Math.max(val, min), max);
            const percent = (clamped - min) / (max - min);
            el.style.strokeDashoffset = 110 - (percent * 110);
            el.style.stroke = colorFn(val);
        }

        async function updateData() {
            if (!API_KEY) {
                document.getElementById('status').innerHTML = "No API Key. <span onclick='setApiKey()'>Set Key</span>";
                return;
            }
            // Include statusId in the fetch list
            const ids = rooms.flatMap(r => [r.tempId, r.humId, r.statusId]).filter(id => id !== null);
            const emonUrl = `https://emoncms.org/feed/fetch.json?ids=${ids.join(',')}&apikey=${API_KEY}&_=${Date.now()}`;
            const url = `https://corsproxy.io/?${encodeURIComponent(emonUrl)}`;

            try {
                const response = await fetch(url);
                const dataArray = await response.json();
                const dataMap = {};
                ids.forEach((id, index) => { dataMap[id] = parseFloat(dataArray[index]); });

                rooms.forEach(room => {
                    const cur1 = dataMap[room.tempId];
                    if (!isNaN(cur1)) {
                        document.getElementById(`t-val-${room.tempId}`).innerText = room.id === "solar" ? cur1.toFixed(2) : cur1.toFixed(1);
                        
                        if (room.id === "solar") {
                            updateGauge(`t-arc-${room.tempId}`, getSunProgress(), 0, 100, () => '#f1c40f');
                        } else {
                            const minT = room.id === "hot-water" ? 10 : 15;
                            const maxT = room.id === "hot-water" ? 70 : 30;
                            const colorFn = room.id === "hot-water" ? (t => t < 45 ? '#40c4ff' : '#ff5252') : (t => t < 24 ? '#00e676' : '#ff5252');
                            updateGauge(`t-arc-${room.tempId}`, cur1, minT, maxT, colorFn);
                        }
                    }

                    if (room.humId) {
                        const cur2 = dataMap[room.humId];
                        if (!isNaN(cur2)) {
                            document.getElementById(`h-val-${room.humId}`).innerText = Math.round(cur2);
                            if (room.id === "solar") {
                                updateGauge(`h-arc-${room.humId}`, cur2, 0, 3500, () => '#f39c12');
                            } else {
                                updateGauge(`h-arc-${room.humId}`, cur2, 30, 70, (h => h < 60 ? '#00e676' : '#ff5252'));
                            }
                        }
                    }

                    // Update Hot Water status light/text
                    if (room.statusId) {
                        const val = dataMap[room.statusId];
                        const led = document.getElementById(`led-${room.statusId}`);
                        const txt = document.getElementById(`text-${room.statusId}`);
                        if (led && txt) {
                            const isOn = val === 1;
                            led.className = isOn ? 'led on' : 'led off';
                            txt.innerText = isOn ? 'Hot Water ON' : 'Hot Water OFF';
                            txt.style.color = isOn ? 'var(--on-color)' : 'var(--off-color)';
                        }
                    }
                });
                lastSuccessTime = Date.now();
                updateTimeAgo();
            } catch (e) { 
                document.getElementById('status').innerText = "Sync Error"; 
            }
        }

        function updateTimeAgo() {
            if (!lastSuccessTime) return;
            const diff = Math.floor((Date.now() - lastSuccessTime) / 1000);
            let text = diff < 60 ? `${diff}s ago` : `${Math.floor(diff/60)}m ago`;
            document.getElementById('status').innerHTML = `Updated ${text} | <span onclick='setApiKey()'>Settings</span>`;
        }

        createCards();
        updateData();
        setInterval(updateData, 60000);
        setInterval(updateTimeAgo, 1000);
    </script>
</body>
</html>
