<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#007bff">
    <title>Home Climate</title>
    <style>
        :root { --bg: #f8f9fa; --card: #ffffff; --primary: #007bff; --text: #333; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        h1 { font-size: 1.4rem; padding-left: 5px; margin-bottom: 20px; font-weight: 800; }
        
        .container { display: grid; grid-template-columns: 1fr; gap: 15px; }
        
        /* Base Card Style */
        .card { 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: background-color 0.5s ease, color 0.5s ease;
            background-color: var(--card);
        }

        /* Humidity Status Colors */
        .hum-low { background-color: #e3f2fd; border-left: 8px solid #2196f3; }    /* Blue (<40%) */
        .hum-mid { background-color: #e8f5e9; border-left: 8px solid #4caf50; }    /* Green (40-60%) */
        .hum-high { background-color: #ffebee; border-left: 8px solid #f44336; }   /* Red (>60%) */

        .room-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 15px; display: block; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 8px; }
        .data-row { display: flex; justify-content: space-between; align-items: center; }
        .stat { flex: 1; }
        .label { font-size: 0.7rem; text-transform: uppercase; color: #666; display: block; margin-bottom: 4px; }
        .value { font-size: 1.8rem; font-weight: 800; color: #222; }
        .unit { font-size: 0.9rem; color: #444; margin-left: 2px; }
        .divider { width: 1px; background: rgba(0,0,0,0.1); height: 40px; margin: 0 15px; }
        
        #status { font-size: 0.7rem; text-align: center; color: #aaa; margin-top: 30px; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>Home Climate</h1>
    <div class="container" id="dashboard"></div>
    <div id="status">Connecting...</div>

    <script>
        const API_KEY = "256cd79c98126a993e5b48790285f0cc";
        
        const rooms = [
            { name: "Living Room",   tempId: "537676", humId: "537677" },
            { name: "Big Bedroom",    tempId: "537680", humId: "537681" },
            { name: "Small Bedroom",  tempId: "537674", humId: "537675" }
        ];

        function createCards() {
            const container = document.getElementById('dashboard');
            container.innerHTML = rooms.map(room => `
                <div class="card" id="card-${room.tempId}">
                    <span class="room-name">${room.name}</span>
                    <div class="data-row">
                        <div class="stat">
                            <span class="label">Temp</span>
                            <span class="value" id="temp-${room.tempId}">--</span><span class="unit">°C</span>
                        </div>
                        <div class="divider"></div>
                        <div class="stat">
                            <span class="label">Humidity</span>
                            <span class="value" id="hum-${room.humId}">--</span><span class="unit">%</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Logic for background colors based on Humidity
        function getHumidityClass(val) {
            if (val < 40) return 'hum-low';   // Blue
            if (val <= 60) return 'hum-mid';  // Green
            return 'hum-high';                // Red
        }

        async function updateData() {
            const ids = rooms.flatMap(r => [r.tempId, r.humId]).join(',');
            const targetUrl = `https://emoncms.org/feed/fetch.json?ids=${ids}&apikey=${API_KEY}`;
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                if (!data || data === false) return;

                let dataIndex = 0;
                rooms.forEach(room => {
                    const tempEl = document.getElementById(`temp-${room.tempId}`);
                    const humEl = document.getElementById(`hum-${room.humId}`);
                    const cardEl = document.getElementById(`card-${room.tempId}`);
                    
                    if (data[dataIndex] !== null) {
                        const temp = parseFloat(data[dataIndex++]).toFixed(1);
                        const hum = Math.round(data[dataIndex++]);

                        tempEl.innerText = temp;
                        humEl.innerText = hum;

                        // Apply the color class to the card
                        cardEl.className = 'card ' + getHumidityClass(hum);
                    }
                });

                document.getElementById('status').innerText = "Last Update: " + new Date().toLocaleTimeString();

            } catch (e) {
                console.error("Fetch failed:", e);
                document.getElementById('status').innerText = "Network Error";
            }
        }

        createCards();
        updateData();
        setInterval(updateData, 30000);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
