<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <title>Climate Gauges</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --text: #333; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        h1 { font-size: 1.2rem; text-align: center; margin-bottom: 20px; opacity: 0.7; }
        
        .container { display: grid; grid-template-columns: 1fr; gap: 20px; }
        
        .card { 
            background: var(--card); padding: 20px; border-radius: 24px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center;
            transition: all 0.5s ease; border-top: 6px solid transparent;
        }

        /* Humidity Border Colors */
        .hum-low { border-top-color: #2196f3; }
        .hum-mid { border-top-color: #4caf50; }
        .hum-high { border-top-color: #f44336; }

        .room-name { font-weight: 800; font-size: 1.1rem; display: block; margin-bottom: 10px; }
        
        /* Gauge Styling */
        .gauge-container { position: relative; width: 160px; margin: 0 auto; }
        .gauge-base { fill: none; stroke: #eee; stroke-width: 12; stroke-linecap: round; }
        .gauge-progress { 
            fill: none; stroke: #007bff; stroke-width: 12; 
            stroke-linecap: round; stroke-dasharray: 251.2; 
            stroke-dashoffset: 251.2; transition: stroke-dashoffset 1s ease-out;
            transform: rotate(-180deg); transform-origin: 50% 50%;
        }
        
        .temp-display { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); }
        .temp-val { font-size: 2rem; font-weight: 800; display: block; }
        .temp-unit { font-size: 0.8rem; color: #888; }

        .hum-row { margin-top: 15px; padding-top: 10px; border-top: 1px solid #f0f0f0; color: #666; font-size: 0.9rem; }
        .hum-val { font-weight: 700; color: #333; }
        
        #status { font-size: 0.6rem; text-align: center; color: #aaa; margin-top: 30px; }
    </style>
</head>
<body>

    <h1>Home Dashboard</h1>
    <div class="container" id="dashboard"></div>
    <div id="status">Syncing...</div>

    <script>
        const API_KEY = "256cd79c98126a993e5b48790285f0cc";
        const rooms = [
            { name: "Living Room",   tempId: "537676", humId: "537677" },
            { name: "Big Bedroom",    tempId: "537680", humId: "537681" },
            { name: "Small Bedroom",  tempId: "537674", humId: "537675" }
        ];

        function createCards() {
            document.getElementById('dashboard').innerHTML = rooms.map(room => `
                <div class="card" id="card-${room.tempId}">
                    <span class="room-name">${room.name}</span>
                    <div class="gauge-container">
                        <svg viewBox="0 0 100 100">
                            <path class="gauge-base" d="M 10 50 A 40 40 0 0 1 90 50" />
                            <path class="gauge-progress" id="progress-${room.tempId}" d="M 10 50 A 40 40 0 0 1 90 50" />
                        </svg>
                        <div class="temp-display">
                            <span class="temp-val" id="temp-${room.tempId}">--</span>
                            <span class="temp-unit">°CELSIUS</span>
                        </div>
                    </div>
                    <div class="hum-row">
                        Humidity: <span class="hum-val" id="hum-${room.humId}">--</span>%
                    </div>
                </div>
            `).join('');
        }

        function setGauge(id, temp) {
            const el = document.getElementById(`progress-${id}`);
            // Map temp (0 to 40°C) to stroke-dashoffset (251.2 to 0)
            const min = 0;
            const max = 40;
            const clampedTemp = Math.min(Math.max(temp, min), max);
            const percent = (clampedTemp - min) / (max - min);
            const offset = 251.2 - (percent * 125.6); // 125.6 is half the circle
            el.style.strokeDashoffset = offset;
        }

        async function updateData() {
            const ids = rooms.flatMap(r => [r.tempId, r.humId]).join(',');
            const url = `https://corsproxy.io/?${encodeURIComponent(`https://emoncms.org/feed/fetch.json?ids=${ids}&apikey=${API_KEY}`)}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                if (!data) return;

                let i = 0;
                rooms.forEach(room => {
                    const temp = parseFloat(data[i++]).toFixed(1);
                    const hum = Math.round(data[i++]);

                    document.getElementById(`temp-${room.tempId}`).innerText = temp;
                    document.getElementById(`hum-${room.humId}`).innerText = hum;
                    
                    setGauge(room.tempId, temp);

                    // Humidity color logic
                    const card = document.getElementById(`card-${room.tempId}`);
                    card.className = 'card ' + (hum < 40 ? 'hum-low' : hum <= 60 ? 'hum-mid' : 'hum-high');
                });
                document.getElementById('status').innerText = "Updated: " + new Date().toLocaleTimeString();
            } catch (e) { document.getElementById('status').innerText = "Offline"; }
        }

        createCards();
        updateData();
        setInterval(updateData, 30000);
    </script>
</body>
</html>
