<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f4f7f9">
    <title>Climate Dashboard</title>
    <style>
        :root { --bg: #f4f7f9; --card: #ffffff; --text: #333; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--text); overflow: hidden; }
        
        .container { display: grid; grid-template-columns: 1fr; gap: 8px; height: calc(100vh - 30px); }
        
        .card { 
            background: var(--card); padding: 12px 10px; border-radius: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center;
            display: flex; flex-direction: column; justify-content: space-around;
        }

        .room-name { font-weight: 800; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; color: #666; }
        
        .gauges-row { display: flex; justify-content: space-around; align-items: center; }
        
        .gauge-box { position: relative; width: 46%; max-width: 140px; }
        
        svg { width: 100%; height: auto; display: block; }
        .gauge-base { fill: none; stroke: #eee; stroke-width: 10; stroke-linecap: round; }
        
        .gauge-progress { 
            fill: none; stroke-width: 10; stroke-linecap: round; 
            /* 110 is the visible length of our semi-circle arc */
            stroke-dasharray: 110 251.2; 
            stroke-dashoffset: 110; 
            transition: stroke-dashoffset 1s ease-out, stroke 0.5s ease;
            transform: rotate(-180deg); transform-origin: 50% 50%;
        }
        
        .val-display { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -15%); 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .num { font-size: 1.3rem; font-weight: 800; display: block; line-height: 1; color: #222; }
        .unit { font-size: 0.5rem; color: #bbb; font-weight: 700; text-transform: uppercase; margin-top: 3px; }

        #status { position: fixed; bottom: 4px; width: 100%; font-size: 0.5rem; text-align: center; color: #ccc; }
    </style>
</head>
<body>

    <div class="container" id="dashboard"></div>
    <div id="status">Updating...</div>

    <script>
        const API_KEY = "256cd79c98126a993e5b48790285f0cc";
        const rooms = [
            { name: "Living Room",   tempId: "537676", humId: "537677" },
            { name: "Big Bedroom",    tempId: "537680", humId: "537681" },
            { name: "Small Bedroom",  tempId: "537674", humId: "537675" }
        ];

        function createCards() {
            document.getElementById('dashboard').innerHTML = rooms.map(room => `
                <div class="card">
                    <span class="room-name">${room.name}</span>
                    <div class="gauges-row">
                        <div class="gauge-box">
                            <svg viewBox="0 0 100 100">
                                <path class="gauge-base" d="M 15 50 A 35 35 0 0 1 85 50" />
                                <path class="gauge-progress" id="t-arc-${room.tempId}" d="M 15 50 A 35 35 0 0 1 85 50" />
                            </svg>
                            <div class="val-display">
                                <span class="num" id="t-val-${room.tempId}">--</span>
                                <span class="unit">Temp °C</span>
                            </div>
                        </div>
                        <div class="gauge-box">
                            <svg viewBox="0 0 100 100">
                                <path class="gauge-base" d="M 15 50 A 35 35 0 0 1 85 50" />
                                <path class="gauge-progress" id="h-arc-${room.humId}" d="M 15 50 A 35 35 0 0 1 85 50" />
                            </svg>
                            <div class="val-display">
                                <span class="num" id="h-val-${room.humId}">--</span>
                                <span class="unit">Hum %</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getTempColor(t) {
            if (t < 18) return '#2196f3';
            if (t <= 24) return '#4caf50';
            if (t <= 27) return '#ff9800';
            return '#f44336';
        }

        function getHumColor(h) {
            if (h < 40) return '#2196f3';
            if (h <= 60) return '#4caf50';
            return '#f44336';
        }

        function updateGauge(elId, val, min, max, colorFn) {
            const el = document.getElementById(elId);
            const clamped = Math.min(Math.max(val, min), max);
            
            // Calculate percentage based on the specific range provided
            const percent = (clamped - min) / (max - min);
            
            // 110 is the stroke-dasharray length of our visible arc
            // Offset of 110 = empty, 0 = full
            const offset = 110 - (percent * 110); 
            
            el.style.strokeDashoffset = offset;
            el.style.stroke = colorFn(val);
        }

        async function updateData() {
            const ids = rooms.flatMap(r => [r.tempId, r.humId]).join(',');
            const url = `https://corsproxy.io/?${encodeURIComponent(`https://emoncms.org/feed/fetch.json?ids=${ids}&apikey=${API_KEY}`)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                if (!data) return;

                let i = 0;
                rooms.forEach(room => {
                    const t = parseFloat(data[i++]).toFixed(1);
                    const h = Math.round(data[i++]);

                    document.getElementById(`t-val-${room.tempId}`).innerText = t;
                    document.getElementById(`h-val-${room.humId}`).innerText = h;
                    
                    // Now both use the same relative scale (0% to 100% of their range)
                    updateGauge(`t-arc-${room.tempId}`, t, 10, 35, getTempColor);
                    updateGauge(`h-arc-${room.humId}`, h, 0, 100, getHumColor);
                });
                document.getElementById('status').innerText = "Sync: " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            } catch (e) { document.getElementById('status').innerText = "Offline"; }
        }

        createCards();
        updateData();
        setInterval(updateData, 30000);
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
