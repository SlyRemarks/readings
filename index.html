<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#121212">
    <title>Climate Dashboard</title>
    <style>
        :root { 
            --bg: #f4f7f9; --card: #ffffff; --text: #333; --subtext: #888;
            --gauge-track: #eee; --num-color: #222; --up-color: #f44336; --down-color: #2196f3;
            --hum-up: #2196f3; --hum-down: #ff9800;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --subtext: #999; --gauge-track: #333; --num-color: #ffffff; }
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); min-height: 100vh; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }
        .card { background: var(--card); padding: 20px 15px; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); text-align: center; }
        .room-name { font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; color: var(--subtext); display: block; }
        .gauges-row { display: flex; justify-content: center; align-items: center; gap: 10px; }
        .gauge-box { position: relative; width: 48%; max-width: 140px; }
        .gauge-box.solo { width: 65%; max-width: 180px; }
        svg { width: 100%; height: auto; display: block; }
        .gauge-bg { fill: none; stroke: var(--gauge-track); stroke-width: 10; stroke-linecap: round; }
        .gauge-progress { fill: none; stroke-width: 10; stroke-linecap: round; stroke-dasharray: 110; stroke-dashoffset: 110; transition: stroke-dashoffset 1s ease-out, stroke 0.5s ease; }
        .val-display { position: absolute; top: 52%; left: 50%; transform: translate(-50%, 0%); width: 100%; }
        .num { font-size: 1.5rem; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; color: var(--num-color); letter-spacing: -1px; line-height: 1; }
        .unit { font-size: 0.55rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; margin-top: 4px; display: block; }
        
        .trend { font-size: 0.9rem; margin-left: 3px; font-weight: 900; }
        .trend.up { color: var(--up-color); }
        .trend.down { color: var(--down-color); }
        .trend.h-up { color: var(--hum-up); }
        .trend.h-down { color: var(--hum-down); }
        .trend.stable { color: var(--subtext); opacity: 0.3; }

        #status { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 0.6rem; color: var(--subtext); font-weight: 700; pointer-events: none; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="container" id="dashboard"></div>
    <div id="status">Syncing...</div>

    <script>
        const API_KEY = "256cd79c98126a993e5b48790285f0cc";
        const rooms = [
            { name: "Living Room",   tempId: "537676", humId: "537677" },
            { name: "Big Bedroom",    tempId: "537680", humId: "537681" },
            { name: "Small Bedroom",  tempId: "537674", humId: "537675" },
            { name: "Hot Water",      tempId: "536155", humId: null } 
        ];

        let feedHistory = {};
        let lastSuccessTime = null; // To track exactly when the data arrived

        function createCards() {
            document.getElementById('dashboard').innerHTML = rooms.map(room => `
                <div class="card">
                    <span class="room-name">${room.name}</span>
                    <div class="gauges-row">
                        <div class="gauge-box ${!room.humId ? 'solo' : ''}">
                            <svg viewBox="0 0 100 70">
                                <path class="gauge-bg" d="M 15 50 A 35 35 0 0 1 85 50" />
                                <path class="gauge-progress" id="t-arc-${room.tempId}" d="M 15 50 A 35 35 0 0 1 85 50" />
                            </svg>
                            <div class="val-display">
                                <span class="num" id="t-container-${room.tempId}"><span id="t-val-${room.tempId}">--</span></span>
                                <span class="unit">Temp °C</span>
                            </div>
                        </div>
                        ${room.humId ? `
                        <div class="gauge-box">
                            <svg viewBox="0 0 100 70">
                                <path class="gauge-bg" d="M 15 50 A 35 35 0 0 1 85 50" />
                                <path class="gauge-progress" id="h-arc-${room.humId}" d="M 15 50 A 35 35 0 0 1 85 50" />
                            </svg>
                            <div class="val-display">
                                <span class="num" id="h-container-${room.humId}"><span id="h-val-${room.humId}">--</span></span>
                                <span class="unit">Hum %</span>
                            </div>
                        </div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        const getTempColor = t => t < 18 ? '#2196f3' : t <= 24 ? '#4caf50' : t <= 27 ? '#ff9800' : '#f44336';
        const getWaterTempColor = t => t < 40 ? '#2196f3' : t <= 55 ? '#4caf50' : t <= 65 ? '#ff9800' : '#f44336';
        const getHumColor = h => h < 40 ? '#2196f3' : h <= 60 ? '#4caf50' : '#f44336';

        function updateGauge(elId, val, min, max, colorFn) {
            const el = document.getElementById(elId);
            if(!el) return;
            const clamped = Math.min(Math.max(val, min), max);
            const percent = (clamped - min) / (max - min);
            el.style.strokeDashoffset = 110 - (percent * 110);
            el.style.stroke = colorFn(val);
        }

        function getTrendHTML(current, past, isHumidity = false) {
            if (past === undefined) return '';
            const diff = current - past;
            const threshold = isHumidity ? 0.5 : 0.05;
            if (Math.abs(diff) < threshold) return '<span class="trend stable">−</span>';
            if (isHumidity) return diff > 0 ? '<span class="trend h-up">▲</span>' : '<span class="trend h-down">▼</span>';
            return diff > 0 ? '<span class="trend up">▲</span>' : '<span class="trend down">▼</span>';
        }

        async function updateData() {
            const ids = rooms.flatMap(r => [r.tempId, r.humId]).filter(id => id !== null);
            const url = `https://corsproxy.io/?${encodeURIComponent(`https://emoncms.org/feed/fetch.json?ids=${ids.join(',')}&apikey=${API_KEY}`)}`;

            try {
                const response = await fetch(url);
                const dataArray = await response.json();
                if (!dataArray) return;

                const dataMap = {};
                ids.forEach((id, index) => { dataMap[id] = parseFloat(dataArray[index]); });

                rooms.forEach(room => {
                    const currentT = dataMap[room.tempId];
                    if (currentT !== undefined) {
                        if (!feedHistory[room.tempId]) feedHistory[room.tempId] = [];
                        const pastT = feedHistory[room.tempId][0];
                        feedHistory[room.tempId].push(currentT);
                        if (feedHistory[room.tempId].length > 5) feedHistory[room.tempId].shift();
                        document.getElementById(`t-val-${room.tempId}`).innerText = currentT.toFixed(1);
                        const tCont = document.getElementById(`t-container-${room.tempId}`);
                        const oldT = tCont.querySelector('.trend'); if (oldT) oldT.remove();
                        tCont.insertAdjacentHTML('beforeend', getTrendHTML(currentT, pastT, false));
                        const colorFn = room.name === "Hot Water" ? getWaterTempColor : getTempColor;
                        updateGauge(`t-arc-${room.tempId}`, currentT, room.name === "Hot Water" ? 15:10, room.name === "Hot Water" ? 75:35, colorFn);
                    }

                    if (room.humId && dataMap[room.humId] !== undefined) {
                        const currentH = dataMap[room.humId];
                        if (!feedHistory[room.humId]) feedHistory[room.humId] = [];
                        const pastH = feedHistory[room.humId][0];
                        feedHistory[room.humId].push(currentH);
                        if (feedHistory[room.humId].length > 5) feedHistory[room.humId].shift();
                        document.getElementById(`h-val-${room.humId}`).innerText = Math.round(currentH);
                        const hCont = document.getElementById(`h-container-${room.humId}`);
                        const oldH = hCont.querySelector('.trend'); if (oldH) oldH.remove();
                        hCont.insertAdjacentHTML('beforeend', getTrendHTML(currentH, pastH, true));
                        updateGauge(`h-arc-${room.humId}`, currentH, 0, 100, getHumColor);
                    }
                });
                
                lastSuccessTime = Date.now(); // Record success
                updateTimeAgo(); // Trigger update immediately
            } catch (e) { 
                document.getElementById('status').innerText = "Offline"; 
            }
        }

        function updateTimeAgo() {
            if (!lastSuccessTime) return;
            const diff = Math.floor((Date.now() - lastSuccessTime) / 1000);
            
            let text = "";
            if (diff < 60) {
                text = `Updated ${diff}s ago`;
            } else {
                const mins = Math.floor(diff / 60);
                const secs = diff % 60;
                text = `Updated ${mins}m ${secs}s ago`;
            }
            document.getElementById('status').innerText = text;
        }

        createCards();
        updateData();
        
        setInterval(updateData, 60000); // Fetch data every minute
        setInterval(updateTimeAgo, 1000); // Update the "time ago" counter every second
    </script>
</body>
</html>
