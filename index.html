<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#121212">
    <title>Climate Dashboard</title>
    <style>
        :root { 
            --bg: #f4f7f9; 
            --card: #ffffff; 
            --text: #333; 
            --subtext: #888;
            --gauge-track: #eee;
            --num-color: #222;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212;
                --card: #1e1e1e;
                --text: #e0e0e0;
                --subtext: #999;
                --gauge-track: #333;
                --num-color: #ffffff;
            }
        }

        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 10px; 
            color: var(--text); 
            overflow: hidden; 
            transition: background 0.3s ease;
        }
        
        .container { display: grid; grid-template-columns: 1fr; gap: 8px; height: calc(100vh - 30px); }
        
        .card { 
            background: var(--card); 
            padding: 12px 10px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center;
            display: flex; 
            flex-direction: column; 
            justify-content: space-around;
            transition: background 0.3s ease;
        }

        .room-name { font-weight: 800; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; color: var(--subtext); }
        .gauges-row { display: flex; justify-content: space-around; align-items: center; }
        .gauge-box { position: relative; width: 46%; max-width: 140px; }
        .gauge-box.full-width { width: 100%; max-width: 180px; margin: 0 auto; }
        
        svg { width: 100%; height: auto; display: block; }
        
        .gauge-progress { 
            fill: none; 
            stroke: var(--gauge-track);
            stroke-width: 10; 
            stroke-linecap: round; 
            stroke-dasharray: 110; 
            stroke-dashoffset: 110; 
            transition: stroke-dashoffset 1s ease-out, stroke 0.5s ease;
            transform: rotate(0deg); 
            transform-origin: 50% 50%;
        }
        
        .val-display { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -15%); 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .num { font-size: 1.3rem; font-weight: 800; display: block; line-height: 1; color: var(--num-color); }
        .unit { font-size: 0.5rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; margin-top: 3px; }

        #status { position: fixed; bottom: 4px; width: 100%; font-size: 0.5rem; text-align: center; color: var(--subtext); opacity: 0.6; }
    </style>
</head>
<body>

    <div class="container" id="dashboard"></div>
    <div id="status">Updating...</div>

    <script>
        const API_KEY = "256cd79c98126a993e5b48790285f0cc";
        
        // --- CONFIGURATION ---
        // Replace "YOUR_ID" with your actual Emoncms Feed ID for the cylinder
        const rooms = [
            { name: "Living Room",   tempId: "537676", humId: "537677" },
            { name: "Big Bedroom",    tempId: "537680", humId: "537681" },
            { name: "Small Bedroom",  tempId: "537674", humId: "537675" },
            { name: "Hot Water",      tempId: "YOUR_ID", humId: null } 
        ];

        function createCards() {
            document.getElementById('dashboard').innerHTML = rooms.map(room => `
                <div class="card">
                    <span class="room-name">${room.name}</span>
                    <div class="gauges-row">
                        <div class="gauge-box ${!room.humId ? 'full-width' : ''}">
                            <svg viewBox="0 0 100 100">
                                <path class="gauge-progress" id="t-arc-${room.tempId}" d="M 15 50 A 35 35 0 0 1 85 50" />
                            </svg>
                            <div class="val-display">
                                <span class="num" id="t-val-${room.tempId}">--</span>
                                <span class="unit">Temp °C</span>
                            </div>
                        </div>
                        ${room.humId ? `
                        <div class="gauge-box">
                            <svg viewBox="0 0 100 100">
                                <path class="gauge-progress" id="h-arc-${room.humId}" d="M 15 50 A 35 35 0 0 1 85 50" />
                            </svg>
                            <div class="val-display">
                                <span class="num" id="h-val-${room.humId}">--</span>
                                <span class="unit">Hum %</span>
                            </div>
                        </div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function getTempColor(t) {
            if (t < 18) return '#2196f3';
            if (t <= 24) return '#4caf50';
            if (t <= 27) return '#ff9800';
            return '#f44336';
        }

        function getWaterTempColor(t) {
            if (t < 40) return '#2196f3'; // Cold
            if (t <= 55) return '#4caf50'; // Ideal
            if (t <= 65) return '#ff9800'; // Hot
            return '#f44336'; // Very Hot
        }

        function getHumColor(h) {
            if (h < 40) return '#2196f3';
            if (h <= 60) return '#4caf50';
            return '#f44336';
        }

        function updateGauge(elId, val, min, max, colorFn) {
            const el = document.getElementById(elId);
            if(!el) return;
            const clamped = Math.min(Math.max(val, min), max);
            const percent = (clamped - min) / (max - min);
            const offset = 110 - (percent * 110); 
            el.style.strokeDashoffset = offset;
            el.style.stroke = colorFn(val);
        }

        async function updateData() {
            // Fetch all non-null IDs
            const feedIds = rooms.flatMap(r => [r.tempId, r.humId]).filter(id => id !== null);
            const url = `https://corsproxy.io/?${encodeURIComponent(`https://emoncms.org/feed/fetch.json?ids=${feedIds.join(',')}&apikey=${API_KEY}`)}`;

            try {
                const response = await fetch(url);
                const dataArray = await response.json();
                if (!dataArray) return;

                // Create a map of ID -> Value for easier lookup
                const dataMap = {};
                feedIds.forEach((id, index) => {
                    dataMap[id] = dataArray[index];
                });

                rooms.forEach(room => {
                    // Update Temperature
                    const tRaw = dataMap[room.tempId];
                    if (tRaw !== undefined) {
                        const t = parseFloat(tRaw).toFixed(1);
                        document.getElementById(`t-val-${room.tempId}`).innerText = t;
                        
                        if (room.name === "Hot Water") {
                            updateGauge(`t-arc-${room.tempId}`, t, 10, 80, getWaterTempColor);
                        } else {
                            updateGauge(`t-arc-${room.tempId}`, t, 10, 35, getTempColor);
                        }
                    }

                    // Update Humidity
                    if (room.humId && dataMap[room.humId] !== undefined) {
                        const h = Math.round(dataMap[room.humId]);
                        document.getElementById(`h-val-${room.humId}`).innerText = h;
                        updateGauge(`h-arc-${room.humId}`, h, 0, 100, getHumColor);
                    }
                });
                
                document.getElementById('status').innerText = "Sync: " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            } catch (e) { 
                console.error(e);
                document.getElementById('status').innerText = "Offline"; 
            }
        }

        createCards();
        updateData();
        setInterval(updateData, 30000);
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
