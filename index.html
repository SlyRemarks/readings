<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>EmonCMS Mobile</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; margin: 10px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .value { font-size: 2.5em; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>
    <h1>Home Climate</h1>
    <div class="card">
        <div>Temperature</div>
        <div id="temp" class="value">--</div><span>°C</span>
    </div>
    <div class="card">
        <div>Humidity</div>
        <div id="hum" class="value">--</div><span>%</span>
    </div>

    <script>
        const API_KEY = "YOUR_READ_API_KEY";
        const TEMP_ID = "YOUR_TEMP_FEED_ID";
        const HUM_ID = "YOUR_HUM_FEED_ID";

        async function updateData() {
            try {
                const response = await fetch(`https://emoncms.org/feed/fetch.json?ids=${TEMP_ID},${HUM_ID}&apikey=${API_KEY}`);
                const data = await response.json();
                document.getElementById('temp').innerText = data[0];
                document.getElementById('hum').innerText = data[1];
            } catch (e) { console.error("Update failed", e); }
        }

        // Update every 30 seconds
        setInterval(updateData, 30000);
        updateData();

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
